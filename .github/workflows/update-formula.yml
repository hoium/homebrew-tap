name: Update jc-cli formula

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump formula to latest jc-cli release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/update-formula.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- Formula/jc-cli.rb; then
            echo "No formula change."
            exit 0
          fi
          new="$(awk -F'"' '/^  version /{print $2; exit}' Formula/jc-cli.rb)"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/jc-cli.rb
          git commit -m "Update jc-cli to ${new}"
          git push
